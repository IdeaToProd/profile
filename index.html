<!doctype html>
<!--
  index.html — SPA 진입점이자 SEO의 핵심 파일.
  메타/OG/Schema를 여기에 모아둔다. 실제 배포 시 URL/이미지 경로만 교체하면 된다.
  수정 포인트: <title>, <meta name="description">, og:*, twitter:*, JSON-LD의 name/url/sameAs.
-->
<html lang="ko">
  <head>
    <!-- 1) 기본 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#0E3B2E" />

    <!-- 2) SEO 핵심 -->
    <title>김하민 · Product Manager Portfolio</title>
    <meta
      name="description"
      content="사용자의 불편을 구조로 풀어내는 프로덕트 매니저 김하민. 문제 정의, 데이터 기반 의사결정, 크로스펑셔널 실행으로 임팩트를 만듭니다."
    />
    <meta
      name="keywords"
      content="프로덕트 매니저, PM, 포트폴리오, Product Manager, 김하민, Amplitude, A/B 테스트, PRD"
    />
    <meta name="author" content="김하민" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <!-- 배포 후 실제 도메인으로 교체 (수정 포인트) -->
    <link rel="canonical" href="https://example.com/" />

    <!-- 3) Open Graph (Facebook/LinkedIn/Slack 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="김하민 PM Portfolio" />
    <meta property="og:title" content="김하민 · Product Manager Portfolio" />
    <meta
      property="og:description"
      content="데이터와 공감 사이에서 다음 한 걸음을 결정하는 PM, 김하민의 작업과 철학."
    />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:locale" content="ko_KR" />
    <!-- 실제 OG 이미지는 public/og-image.png 로 교체 (1200x630 권장) -->
    <meta property="og:image" content="https://example.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="김하민 PM 포트폴리오 대표 이미지" />

    <!-- 4) Twitter/X 카드 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="김하민 · Product Manager Portfolio" />
    <meta
      name="twitter:description"
      content="데이터와 공감 사이에서 다음 한 걸음을 결정하는 PM."
    />
    <meta name="twitter:image" content="https://example.com/og-image.png" />

    <!-- 5) Schema.org 구조화 데이터 (Google Rich Results 대상: Person + WebSite) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "name": "김하민",
            "jobTitle": "Product Manager",
            "description": "사용자의 불편을 구조로 풀어내는 프로덕트 매니저.",
            "url": "https://example.com/",
            "image": "https://example.com/og-image.png",
            "sameAs": [
              "https://www.linkedin.com/in/hamin",
              "https://github.com/hamin",
              "https://hamin.notion.site/"
            ],
            "knowsAbout": ["Product Management", "Data Analytics", "Experimentation", "UX Research"]
          },
          {
            "@type": "WebSite",
            "name": "김하민 PM Portfolio",
            "url": "https://example.com/",
            "inLanguage": "ko-KR"
          }
        ]
      }
    </script>

    <!-- 6) 파비콘 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- 7) 폰트: preconnect로 핸드셰이크 비용 절감 (성능 ↑) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  </head>
  <body>
    <!-- React 마운트 지점 -->
    <div id="root"></div>
    <!-- 모듈 엔트리 (Vite) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
